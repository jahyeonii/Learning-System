<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGo - Sign-in</title>
<link rel="stylesheet" href="../SchoolSystem/css/login.css">

</head>

<body>

<a href="/Learning-System/landingpage.html" class="logo">StudyGo 🎮</a>

<div class="form-box">
<form action="../TRY/try.html" method="get">

<h1>Log-in</h1>

<label for="email">E-mail:</label>
<input type="text" name="email" id="email" placeholder="E-mail" required>

<br><br>

<label for="password">Password:</label>
<input type="password" name="password" id="password" placeholder="Password" required>

<button type="submit" class="btn">Log-in</button>

<p class="log">
    Don't have an account? 
    <a href="../sign in/signin.html"><u>Create Account</u></a>
</p>

</form>
</div>

</body>
</html>
