<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyGo - Log-in</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <a href="/Pages/landingpage.html" class="logo">StudyGo 🎮</a>
    
    <div class="form-box">
        <form id="loginForm">
        
        <h1>Log-in</h1>
        
        <label for="email">E-mail:</label>
        <input type="text" name="email" id="email" placeholder="E-mail" required>
        
        <br><br>
        
        <label for="password">Password:</label>
        <input type="password" name="password" id="password" placeholder="Password" required>
        
        <button type="submit" class="btn">Log-in</button>
        
        <p class="log">
            Don't have an account? 
            <a href="../Pages/signin.html"><u>Create Account</u></a>
        </p>
        
        </form>
    </div>
     <!-- JS -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
        
        const loginForm = document.getElementById("loginForm");

        if (loginForm) {
            loginForm.addEventListener("submit", function(e) {
                e.preventDefault();

                const email = document.getElementById("email").value.trim().toLowerCase();
                const password = document.getElementById("password").value.trim();

                if (email === "admin@studygo.com" && password === "admin123") {
                    window.location.href = "../Pages/admin.html";
                } else {
                    window.location.href = "../Pages/home.html";
                }
            });
        } else {
            console.error("The browser couldn't find an element with id='loginForm'");
        }
    });
    </script>


</body>
</html>
