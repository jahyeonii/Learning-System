<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudyGo - Sound Settings</title>
    <link rel="stylesheet" href="../settings/settings.css">
</head>
<body>

<a href="#" class="logo">StudyGo 🎮</a>

<div class="form-box">
    <div style="width:100%;">
        <h1>Sound</h1>

        <label>🔊 Volume</label>
        <input type="range" class="slider" id="master" value="80">

        <label>🎵 Background Music</label>
        <input type="range" class="slider" id="music" value="60">

        <label>✨ Sound Effects</label>
        <input type="range" class="slider" id="effects" value="70">

        <div class="mute-row">
            <span>🔇 Mute</span>
            <label class="switch">
                <input type="checkbox" id="muteToggle">
                <span class="slider-toggle"></span>
            </label>
        </div>

    </div>
</div>

</body>
</html>
