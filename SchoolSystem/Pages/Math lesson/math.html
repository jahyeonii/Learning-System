<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Math Quiz</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', 'Comic Sans MS', sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #fff8e1);
    color: #333;
}

/* Logo */
.logo {
    display: block;
    text-align: center;
    font-size: 28px;
    margin: 20px 0;
    text-decoration: none;
    font-weight: bold;
    color: #ff7f50;
}

/* Card */
.form-box {
    width: 420px;
    margin: auto;
    padding: 25px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    border: 3px dashed #ffd966;
    animation: float 4s ease-in-out infinite;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #ff7043;
}

/* MENU (CENTERED BUTTONS) */
.menu {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.menu p {
    width: 100%;
    text-align: center;
    margin-bottom: 10px;
    font-weight: bold;
}

.menu button {
    width: 45%;
    background: linear-gradient(45deg, #6ec1e4, #4caf50);
    border: none;
    padding: 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 15px;
    color: white;
    transition: 0.3s;
}

.menu button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #4caf50, #6ec1e4);
}

/* Game Info */
#level, #score, #correctWrong {
    font-size: 16px;
    margin: 8px 0;
    font-weight: bold;
    text-align: center;
}

/* Question */
#question {
    font-size: 20px;
    margin: 15px 0;
    padding: 15px;
    border-radius: 15px;
    background: linear-gradient(120deg, #ffe0b2, #ffccbc);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
}

/* Options */
.options {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
}

.options button {
    width: 48%;
    margin-top: 8px;
    background: linear-gradient(45deg, #6ec1e4, #4caf50);
    border: none;
    padding: 12px;
    border-radius: 20px;
    cursor: pointer;
    color: white;
}

/* Change button */
#changeLesson {
    margin-top: 10px;
    width: 100%;
    background: linear-gradient(45deg, #ff7043, #ffb74d);
    border: none;
    padding: 12px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
}

/* Hidden */
.hidden {
    display: none;
}

/* Responsive */
@media (max-width: 480px) {
    .form-box {
        width: 90%;
        padding: 20px;
    }
}
</style>
</head>

<body>

<a href="/Learning-System/landingpage.html" class="logo">StudyGo 🎮</a>

<div class="form-box">
<form>

<h1>Fun Math Quiz</h1>

<div class="menu">
    <p>Choose a math operation:</p>

    <button type="button" onclick="startGame('addition')">➕ Addition</button>
    <button type="button" onclick="startGame('subtraction')">➖ Subtraction</button>
    <button type="button" onclick="startGame('multiplication')">✖️ Multiplication</button>
    <button type="button" onclick="startGame('division')">➗ Division</button>
</div>

</form>
</div>

</body>
</html>
