<script>
function endLesson() {
  clearInterval(lesson.timerInterval);
  document.getElementById('powerup-bar').classList.remove('visible');

  const total = lesson.questions.length;
  const acc = Math.round((lesson.correct / total) * 100);
  const avgTime = Math.round((lesson.totalTime / total) / 1000);
  
  // Calculate Rewards
  let xpGained = lesson.correct * 10;
  if(lesson.isTest) xpGained *= 2; 
  if(state.dayStreak >= 3) xpGained = Math.floor(xpGained * 1.5);
  
  const coinsGained = lesson.correct * 2 + (acc === 100 ? 20 : 0);
  const stars = acc >= 90 ? 3 : acc >= 70 ? 2 : acc >= 40 ? 1 : 0;

  // Update State
  state.xp += xpGained;
  state.coins += coinsGained;
  state.totalCorrect += lesson.correct;
  state.totalAttempts += total;
  
  // Update UI Elements
  document.getElementById('journey-zone-label').textContent = state.currentZone.name;
  document.getElementById('journey-xp-gained').textContent = xpGained;
  document.getElementById('jr-xp').textContent = "+" + xpGained;
  document.getElementById('jr-coins').textContent = "+" + coinsGained;
  document.getElementById('jr-accuracy').textContent = acc + "%";
  document.getElementById('jr-combo').textContent = "x" + lesson.maxCombo;
  document.getElementById('jr-time').textContent = avgTime + "s";
  document.getElementById('jstat-correct').textContent = lesson.correct;
  document.getElementById('jstat-wrong').textContent = lesson.wrong;
  document.getElementById('jstat-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);

  // Show the Result Screen
  showScreen('result');
  
  // Animate XP Bar
  setTimeout(() => {
    const pct = Math.min((state.xp / state.xpToNext) * 100, 100);
    document.getElementById('journey-xp-fill').style.width = pct + "%";
  }, 500);

  updateHUD();
}
</script>
