<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyGo - Parent Profile</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #fff8e1);
            color: #333;
        }

        .logo {
            display: block;
            text-align: center;
            font-size: 28px;
            margin: 20px 0;
            text-decoration: none;
            font-weight: bold;
            color: #ff7f50;
        }

        .form-box {
            width: 420px;
            margin: auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 3px dashed #ffd966;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #ff7043;
        }

        h4 {
            margin-top: 15px;
            margin-bottom: 10px;
            color: #4caf50;
            border-left: 5px solid #4caf50;
            padding-left: 8px;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #555;
        }

        .field input {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        .field input:focus {
            border-color: #6ec1e4;
            background: #f0fbff;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #6ec1e4, #4caf50);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #4caf50, #6ec1e4);
        }

        .create {
            text-align: center;
            margin-top: 12px;
        }

        .create a {
            text-decoration: none;
            color: #ff7043;
            font-weight: bold;
        }

        .create a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form-box {
                width: 90%;
                padding: 20px;
            }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body>

<a href="#" class="logo">StudyGo 🎮</a>

<div class="form-box">
    <form onsubmit="goToDashboard(event)">
        <h1>Parent Profile Set-up</h1>

        <h4>Parent Information</h4>

        <div class="field">
            <label>First Name:</label>
            <input type="text" id="parent-first-name" placeholder="First Name" required>
        </div>

        <div class="field">
            <label>Middle Initial:</label>
            <input type="text" id="parent-middle-initial" placeholder="Middle Initial" required>
        </div>

        <div class="field">
            <label>Surname:</label>
            <input type="text" id="parent-surname" placeholder="Surname" required>
        </div>

        <div class="field">
            <label>Phone Number:</label>
            <input type="text" id="phone" placeholder="e.g 09XX-XXX-XXXX" required>
        </div>

        <div class="field">
            <label>Address:</label>
            <input type="text" id="address" placeholder="Your Address" required>
        </div>

        <h4>Child Information</h4>

        <div class="field">
            <label>First Name:</label>
            <input type="text" id="child-first-name" placeholder="First Name" required>
        </div>

        <div class="field">
            <label>Middle Initial:</label>
            <input type="text" id="child-middle-initial" placeholder="Middle Initial" required>
        </div>

        <div class="field">
            <label>Surname:</label>
            <input type="text" id="child-surname" placeholder="Surname" required>
        </div>

        <div class="field">
            <label>Student ID:</label>
            <input type="text" id="s-id" placeholder="e.g 2024-1234-01" required>
        </div>

        <button class="btn" type="submit">Let's Go! 🚀</button>

        <p class="create">
            <a href="#">Back to Sign-in</a>
        </p>
    </form>
</div>

<script>
    function goToDashboard(event) {
        event.preventDefault(); // stop reload

        // OPTIONAL: save data
        localStorage.setItem("parentName", document.getElementById("parent-first-name").value);
        localStorage.setItem("childName", document.getElementById("child-first-name").value);

        // redirect to dashboard
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>
