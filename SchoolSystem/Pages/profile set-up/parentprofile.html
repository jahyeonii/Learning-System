<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>StudyGo - Profile Set-up</title>
        <link rel="stylesheet" href="../../css/styles.css">
    </head>
    <body>
        <a href="/Learning-System/landingpage.html" class="logo">StudyGo 🎮</a>
        
        <div class="form-box">
            <form action="" method="post"> 
                <h1>Parent Profile Set-up</h1>
                

                <h4>Parent Information</h4>
                
                <div class="field">
                <input type="file" name="profile-pic" id="profile-pic" accept="image/*" style="display:none">
                </div>
                
                <div class="field">
                <label for="first-name">First Name:</label>
                <input type="text" name="first-name"  id="first-name" placeholder="First Name" required>
                </div>
                
                <div class="field">
                <label for="middle-inital">Middle Initial:</label>
                <input type="text" name="middle-inital"  id="middle-inital" placeholder="Middle Initial" required>
                </div>
                
                <div class="field">
                <label for="surname">Surname:</label>
                <input type="text" name="surname"  id="surname" placeholder="Surname" required>
                </div>
                
                <div class="field">
                <label for="phone">Phone Number:</label>
                <input type="text" name="phone"  id="phone" placeholder="e.g 09XX-XXX-XXXX" required>
                </div>
                
                <div class="field">
                <label for="address">Address:</label>
                <input type="text" name="address"  id="address" placeholder="e.g Zamboanga Del Sur, Zamboanga City, Divisoria. " required> 
                </div>
                
                <h4>Child Information</h4>

                <div class="field">
                <label for="first-name">First Name:</label>
                <input type="text" name="first-name"  id="first-name" placeholder="First Name" required> 
                </div>
                <div class="field">
                <label for="middle-inital">Middle Initial:</label>
                <input type="text" name="middle-inital"  id="middle-inital" placeholder="Middle Initial" required> 
                </div>
                <div class="field">
                <label for="surname">Surname:</label>
                <input type="text" name="surname"  id="surname" placeholder="Surname" required> 
                </div>
                <div class="field">
                <label for="s-id">Student ID:</label>
                <input type="text" name="s-id"  id="s-id" placeholder="e.g 2024-1234-01" required> 
                </div>
                
                <button class="btn" type="submit" onclick="window.location.href='#'">Let's Go! 🚀</button>

                <p class="create">
                <a href="../sign-in page/signin-parent.html">Back to Sign-in</a>
            </form>
        </div>
    </body>
</html>
