<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>StudyGo - Profile Set-up</title>
        <link rel="stylesheet" href="../../css/styles.css">
    </head>
    <body>
         <a href="/Learning-System/landingpage.html" class="logo">StudyGo 🎮</a>

        <div class="form-box">
            <form action="" method="post"> 
                <h1>Profile Set-up</h1>
                
                <div class="field">
                <label for="first-name">First Name:</label>
                <input type="text" name="first-name"  id="first-name" placeholder="First Name" required> 
                </div>
                <div class="field">
                <label for="middle-inital">Middle Initial:</label>
                <input type="text" name="middle-inital"  id="middle-inital" placeholder="Middle Initial" required> 
                </div>
                <div class="field">
                <label for="surname">Surname:</label>
                <input type="text" name="surname"  id="surname" placeholder="Surname" required> 
                </div>
                <div class="field">
                <label for="birthday">Birthday:</label>
                <input type="date" name="birthday"  id="birthday" required>
                </div>

                <button class="btn" type="submit" onclick="window.location.href='#'">Let's Go!</button>

                <p class="create">
                <a href="../sign-in page/signin.html">Back to Sign-in</a>
            </form>
        </div>
    </body>
</html>
