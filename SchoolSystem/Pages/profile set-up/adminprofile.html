<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyGo - Profile Set-up</title>
    <link rel="stylesheet" href="../../css/styles.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .logo {
            display: block;
            text-align: center;
            font-size: 24px;
            margin: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .form-box {
            width: 350px;
            margin: auto;
            padding: 25px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        .field {
            margin-bottom: 15px;
        }

        .field label {
            display: block;
            margin-bottom: 5px;
        }

        .field input {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #avatarLabel {
            display: block;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        #avatarCircle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            font-size: 30px;
            overflow: hidden;
        }

        #avatarCircle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn:hover {
            background: #45a049;
        }

        .create {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<a href="/Learning-System/landingpage.html" class="logo">StudyGo 🎮</a>

<div class="form-box">
    <form action="" method="post"> 
        <h1>Admin Profile Set-up</h1>
        
        <div class="field">
            <label for="first-name">First Name:</label>
            <input type="text" id="first-name" placeholder="First name" required>
        </div>

        <div class="field">
            <label for="middle-initial">Middle Initial:</label>
            <input type="text" id="middle-initial" placeholder="Middle initial" required>
        </div>

        <div class="field">
            <label for="surname">Surname:</label>
            <input type="text" id="surname" placeholder="Surname" required>
        </div>

        <div class="field">
            <label for="e-id">Employee ID:</label>
            <input type="text" id="e-id" placeholder="e.g. 2024-ADMIN-01" required>
        </div>

        <div class="field">
            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" placeholder="e.g. 09XX-XXX-XXXX" required>
        </div>

        <button class="btn" type="submit">Let's Go!</button>

        <p class="create">
            <a href="../sign-in page/signin-admin.html">Back to Sign-in</a>
        </p>
    </form>
</div>
</body>
</html>
