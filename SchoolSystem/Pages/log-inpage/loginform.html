<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>StudyGo</title>
        <link rel="stylesheet" href="../../css/styles.css">
    </head>
    <body>
        <div class="login">
            <center>
                <form action="" method="post">
                    <h1>Log-in</h1>
                    <label for="username">E-mail/Username:</label>
                    <input type="text" name="username"  id="username" required="true"> <br /> <br />
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password" required="true"> <br /> <br />
                    
                    <a href="../log-inpage/forgot.html" class="forgot">Forgot Password?</a>
                    <br />

                    <button class="login-btn">Log-In</button>
                    <p class="create">
                        Dont Have an Account? <a href="#">Create One</a>
                    </p>
                </form>
            </center>
        </div>
    </body>
</html>
