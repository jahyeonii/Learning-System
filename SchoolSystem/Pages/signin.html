<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGo - Sign-in</title>
<link rel="stylesheet" href="../SchoolSystem/css/signin.css">

</head>

<body>

<a href="/Learning-System/landingpage.html" class="logo">StudyGo 🎮</a>

<div class="form-box">
<form action="../admin/index.html" method="get"> 

<h1>Sign-in</h1>

<label for="email">Enter E-mail:</label>
<input type="text" name="email" id="email" placeholder="E-mail" required>

<br><br>

<label for="password">Enter Password:</label>
<input type="password" name="password" id="password" placeholder="At least 8 characters" required>

<br><br>

<label for="password">Confirm Password:</label>
<input type="password" name="password" id="password" placeholder="Password" required>

<button type="submit" class="btn">Sign-In</button> 

<p class="log">
    Already Have an Account? 
    <a href="../Login/login.html"><u>Log-in</u></a>
</p>

</form>
</div>

</body>
</html>
