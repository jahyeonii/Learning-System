<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyGo - Sign-in</title>
    <link rel="stylesheet" href="../css/signin.css">
</head>

<body>

    <a href="/Pages/landingpage.html" class="logo">StudyGo 🎮</a>

    <div class="form-box">
        <form action="../Pages/home.html" method="get" onsubmit="return checkPassword()"> 

            <h1>Sign-in</h1>

            <label for="email">Enter E-mail:</label>
            <input type="text" name="email" id="email" placeholder="E-mail" required>

            <br><br>

            <label for="password">Enter Password:</label>
            <input type="password" name="password" id="password" placeholder="At least 8 characters" required>

            <br><br>

            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Password" required>

            <button type="submit" class="btn">Sign-In</button> 

            <p class="log">
                Already Have an Account? 
                <a href="../Pages/login.html"><u>Log-in</u></a>
            </p>
            
        </form>
    </div>

    <script>

        let password = document.getElementById("password");
        let confirmPassword = document.getElementById("confirmPassword");

        confirmPassword.addEventListener("focus", function () {

            if (password.value.length < 8) {
                password.value = "";
                password.placeholder = "Input a password at least 8 characters";
                password.focus();
                confirmPassword.blur();
            }

        });

        function checkPassword() {

            if (password.value !== confirmPassword.value) {
                confirmPassword.value = "";
                confirmPassword.placeholder = "Passwords didn't match";
                confirmPassword.focus();
                return false;
            }

            return true;
        }

    </script>

</body>
</html>
