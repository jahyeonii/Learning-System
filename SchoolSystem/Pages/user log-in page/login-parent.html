<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>StudyGo - Admin Log-in</title>
        <link rel="stylesheet" href="../../css/styles.css">
    </head>
    
    <body>
         <div class="logo">
            StudyGo
        </div>
        <div class="form-box">
                <form action="" method="post">
                    <h1>Log-in as</h1>
                    <div class="login-role">
                        <a href="../user log-in page/loginform.html">Student</a>
                        <a href="../user log-in page/login-admin.html">Admin</a>
                        <a href="../user log-in page/login-parent.html" class="active">Parent</a>
                    </div>

                    <label for="email">E-mail:</label>
                    <input type="text" name="email"  id="email" placeholder="Enter your E-mail here" required> <br /> <br />
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password" placeholder="Enter your Password here" required> <br /> <br />
                    
                    <a href="../user log-in page/forgot.html" class="forgot">Forgot Password?</a>
                    <br />

                    <button class="btn">Log-In</button>
                    <p class="create">
                        Dont Have an Account? <a href="../sign-in page/signin-parent.html">Create One</a>
                    </p>
                </form>
        </div>
    </body>
</html>
