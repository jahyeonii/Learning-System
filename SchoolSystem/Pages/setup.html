<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyGo - Parent Profile</title>
    <link rel="stylesheet" href="../admin/style.css">
</head>

<body>

<a href="../TRY/try.html\" class="logo">StudyGo 🎮</a>

<div class="form-box">
    <form action="../TRY/try.html">
        <h1>Profile Set-up</h1>

        <h4>Parent Information</h4>

        <div class="field">
            <label>First Name:</label>
            <input type="text" id="parent-first-name" placeholder="First Name" required>
        </div>

        <div class="field">
            <label>Middle Name:</label>
            <input type="text" id="parent-middle-initial" placeholder="Middle Name">
        </div>

        <div class="field">
            <label>Surname:</label>
            <input type="text" id="parent-surname" placeholder="Surname" required>
        </div>

        <div class="field">
            <label>Phone Number:</label>
            <input type="text" id="phone" placeholder="e.g 09XX-XXX-XXXX" required>
        </div>

        <div class="field">
            <label>Address:</label>
            <input type="text" id="address" placeholder="Your Address" required>
        </div>
 
        <h4>Child Information</h4>

        <div class="field">
            <label>First Name:</label>
            <input type="text" id="child-first-name" placeholder="First Name" required>
        </div>

        <div class="field">
            <label>Middle Name:</label>
            <input type="text" id="child-middle-initial" placeholder="Middle Name">
        </div>

        <div class="field">
            <label>Surname:</label>
            <input type="text" id="child-surname" placeholder="Surname" required>
        </div>

        <div class="field">
            <label>Birth Date:</label>
            <input type="date" placeholder="05/03/2024" required>
        </div> 

        <button class="btn" type="submit">Let's Go!</button>
       
        <p class="create">
            <a href="../Login/login.html"><u>Back to Log-in</u></a>
        </p>
    </form>
</div>

</body>
</html>
