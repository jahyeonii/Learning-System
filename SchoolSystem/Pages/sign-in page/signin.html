<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/styles.css">
    <title>Studygo - Sign-in</title>
</head>
<body>
    <div class="sign-in">
        <form action="" method="post">
                    <h1>Sign-in</h1>
                    <label for="username">Username:</label>
                    <input type="text" name="username"  id="username" placeholder="Enter your Username here" required> <br /> <br />
                    <label for="email">E-mail:</label>
                    <input type="email" name="email"  id="email" placeholder="Enter your Parent's E-mail here" required> <br /> <br />
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password" placeholder="Enter your Password here" required> <br /> <br />

                    <button class="signin-btn">Sign-In</button>
                    

                    <p class="log">
                        Already Have an Account? <a href="../log-inpage/loginform.html">Log-in</a>
                    </p>
        </form>
    </div>
</body>

</html>
