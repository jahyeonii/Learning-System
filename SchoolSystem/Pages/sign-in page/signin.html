<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/styles.css">
    <title>StudyGo - Sign-in</title>
</head>
<body>
    <div class="form-box">
        <form action="" method="post">
                    <h1>Sign-in</h1>
                    <label for="email">E-mail:</label>
                    <input type="email" name="email"  id="email" placeholder="Enter your Parent's E-mail here" required> <br /> <br />
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password" placeholder="Enter your Password here" required> <br /> <br />

                    <button class="btn"  onclick="window.location.href='../profile set-up/userprofile.html'">Sign-In</button>
                    

                    <p class="log">
                        Already Have an Account? <a href="../user log-in page/loginform.html">Log-in</a>
                    </p>
        </form>
    </div>
</body>
</html>
