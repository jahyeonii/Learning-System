            <h1>How to MULTIPLY numbers?</h1>

            <h2>✖️ Multiplying (Adding the same number multiple times)</h2>

            <h3>- Multiplying means adding the same number again and again.</h3>

            <br>

            <h4>
                🍬 Example:
                <br><br>
                You have 3 bags, and each bag has 2 candies.
                <br>
                So instead of saying:
                <br>
                2 + 2 + 2
                <br>
                We say:
                <br><br>
                3 × 2 = 6 candies
                <br>
                🍬🍬🍬 + 🍬🍬🍬 = 🍬🍬🍬🍬🍬🍬 
            </h4>

            <br>
