<!DOCTYPE html>
<html>
    <head>
    <title>Recognize Color</title>
    <link rel="stylesheet" href="../SchoolSystem/css/colorlesson.css">
    </head>
<body>

    <div class="logo">🎨 Color Game</div>

    <div class="form-box">
        <h1>Find the Color!</h1>

        <div id="question"></div>
        <div class="options" id="options"></div>

        <div id="result"></div>
        <div id="score">⭐ Score: 0</div>
    </div>

<script>
    let score = 0;

let colors = [
    {name: "red", value: "red"},
    {name: "blue", value: "blue"},
    {name: "yellow", value: "yellow"},
    {name: "green", value: "green"}
];

function newQuestion() {
    let correct = colors[Math.floor(Math.random() * colors.length)];

    document.getElementById("question").innerText =
        "Which color is " + correct.name + "?";

    let choices = [...colors].sort(() => Math.random() - 0.5);

    let html = "";
    choices.forEach(c => {
        html += `<button style="background:${c.value}" onclick="check('${c.name}','${correct.name}')"></button>`;
    });

    document.getElementById("options").innerHTML = html;
}

function check(ans, correct) {
    if (ans === correct) {
        score++;
        document.getElementById("result").innerText = "✅ Correct!";
    } else {
        document.getElementById("result").innerText = "❌ Try again!";
    }

    document.getElementById("score").innerText = "⭐ Score: " + score;
    setTimeout(newQuestion, 800);
}

newQuestion();
</script>

</body>
</html>
