<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Go</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/end.css">

</head>
<body>
    <div class="top-bar">
        <div class="stat-group">
            <span style="color:#ff7043">StudyGo 🎮</span>

        </div>
    </div>

    <div class="victory-container">
        <h1 class="victory-title">⚔️ Legendary Victory!</h1>
        
        <div class="avatar-circle">
            <img src="../Games/Sahur2.webp" alt="pfp">
        </div>
        
        <div class="xp-info">Level 3</div>
        <div class="progress-container">
            <div class="progress-fill"></div>
        </div>
        <div class="xp-info">+8 Stars ⭐ earned this quest, Job well done!</div>
        <br>
        <div class="xp-info">+160 EXP 🆙 earned this quest, Job well done!</div>
        <br>

        <div class="rewards-card">
            <div class="reward" style="font-weight: 800; margin-bottom: 15px; color: var(--text2);">⚔️ REWARDS</div>
            
            <div class="reward-line">
                <div class="reward-label">⭐ Star Earned</div>
                <div class="reward-val">+8 🏹</div>
            </div>

            <div class="reward-line">
                <div class="reward-label">🆙 EXP Earned</div>
                <div class="reward-val">160+ 🏹</div>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-num" style="color: var(--grass);">8</span>
            <span class="stat-label">Correct</span>
        </div>
        <div class="stat-box">
            <span class="stat-num" style="color: red;">2</span>
            <span class="stat-label">Wrong</span>
        </div>
    </div>

    <div class="actions-container">
        <button class="btn-main btn-world">
             🔄 Try Again
        </button>
    </div>

</body>
</html>

    <div class="bottom-nav">
            <a href="../Pages/home.html">🏠 Home</a>
            <a href="../Games/math.html">🎮 Games</a>
            <a href="../Pages/leaderboards.html">🎖️ Leaderboards</a>
        </div>

</body>
</html>

</div>

</body>
</html>
