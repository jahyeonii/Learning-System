<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>StudyGo - Log-in</title>
        <link rel="stylesheet" href="../../css/styles.css">
    </head>
    <body>
        <div class="login">
                <form action="" method="post">
                    <h1>Log-in</h1>
                    <label for="email">E-mail/Username:</label>
                    <input type="text" name="email"  id="email" placeholder="Enter your E-mail or Username here" required> <br /> <br />
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password" placeholder="Enter your Password here" required> <br /> <br />
                    
                    <a href="../log-inpage/forgot.html" class="forgot">Forgot Password?</a>
                    <br />

                    <button class="login-btn">Log-In</button>
                    <p class="create">
                        Dont Have an Account? <a href="../sign-in page/signin.html">Create One</a>
                    </p>
                </form>
        </div>
    </body>
</html>
